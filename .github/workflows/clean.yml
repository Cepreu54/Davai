name: Merge All Clean Subscriptions

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download and merge all sources
        run: |
          curl -s "https://raw.githubusercontent.com/Cepreu54/vless-clean/main/clean.txt" > source1.txt
          curl -s "https://raw.githubusercontent.com/Cepreu54/vless-clean-2/main/clean.txt" > source2.txt
          curl -s "https://raw.githubusercontent.com/Cepreu54/vless-clean-3/main/clean.txt" > source3.txt
          cat source1.txt source2.txt source3.txt | grep -v '^$' | sort -u > clean.txt

      - name: Count servers
        run: |
          count=$(wc -l < clean.txt)
          echo "✅ Всего уникальных серверов: $count"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add clean.txt
          git diff --staged --quiet || git commit -m "Auto-merge $(date +'%Y-%m-%d %H:%M:%S')"
          git push
