name: Multi-Source Filter & Shuffle (Only VLESS)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download and filter all sources
        run: |
          ALL_SERVERS=""

          for i in {1..26}; do
            URL="https://raw.githubusercontent.com/AvenCores/goida-vpn-configs/refs/heads/main/githubmirror/${i}.txt"
            echo "Processing: $URL"
            
            # Скачиваем, убираем бинарный мусор, оставляем только vless:// строки
            DATA=$(curl -sL --connect-timeout 10 "$URL" 2>/dev/null | tr -cd '[:print:]\n' | grep '^vless://' || echo "")
            
            if [ -n "$DATA" ]; then
              # Убираем Россию, оставляем хорошие страны
              FILTERED=$(echo "$DATA" | grep -v '%F0%9F%87%B7%F0%9F%87%BA' | grep -E '%F0%9F%87%A9%F0%9F%87%AA|%F0%9F%87%B3%F0%9F%87%B1|%F0%9F%87%B5%F0%9F%87%B1|%F0%9F%87%AB%F0%9F%87%AE|%F0%9F%87%B8%F0%9F%87%AA|%F0%9F%87%B1%F0%9F%87%BB|%F0%9F%87%B1%F0%9F%87%B9')
              COUNT=$(echo "$FILTERED" | wc -l)
              echo "  -> Found $COUNT vless servers"
              ALL_SERVERS="$ALL_SERVERS"$'\n'"$FILTERED"
            else
              echo "  -> No vless servers found"
            fi
          done

          echo "$ALL_SERVERS" | grep -v '^$' | sort -u > all_servers.txt

      - name: Split into 26 files
        run: |
          TOTAL=$(wc -l < all_servers.txt)
          echo "Total unique vless servers: $TOTAL"
          if [ "$TOTAL" -eq 0 ]; then
            for i in {1..26}; do echo "" > "clean$i.txt"; done
          else
            shuf all_servers.txt > shuffled.txt
            PER_FILE=$(( (TOTAL + 25) / 26 ))
            split -l $PER_FILE -d shuffled.txt part_
            for i in {0..25}; do
              FILE_NUM=$((i+1))
              if [ -f "part_$i" ]; then
                cp "part_$i" "clean$FILE_NUM.txt"
                rm "part_$i"
              else
                echo "" > "clean$FILE_NUM.txt"
              fi
            done
            rm -f shuffled.txt
          fi
          rm -f all_servers.txt

      - name: Commit and push with token
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add clean*.txt
          git diff --staged --quiet || git commit -m "Auto-update $(date +'%Y-%m-%d %H:%M:%S')"
          git push https://Cepreu54:${{ secrets.GH_TOKEN }}@github.com/Cepreu54/Davai.git main
