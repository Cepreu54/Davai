name: Multi-Source Filter & Shuffle (Only VLESS)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download and filter all sources
        run: |
          # –°–њ–Є—Б–Њ–Ї —Б—Б—Л–ї–Њ–Ї AvenCores (1-26)
          ALL_SERVERS=""

          for i in {1..26}; do
            URL="https://raw.githubusercontent.com/AvenCores/goida-vpn-configs/refs/heads/main/githubmirror/${i}.txt"
            echo "Processing: $URL"
            
            # –Я—А–Њ–±—Г–µ–Љ —Б–Ї–∞—З–∞—В—М, –µ—Б–ї–Є –Њ—И–Є–±–Ї–∞ вАФ –њ—А–Њ–њ—Г—Б–Ї–∞–µ–Љ
            DATA=$(curl -s --connect-timeout 10 "$URL" 2>/dev/null || echo "")
            
            if [ -n "$DATA" ]; then
              # –§–Є–ї—М—В—А: —В–Њ–ї—М–Ї–Њ vless:// + —Г–±–Є—А–∞–µ–Љ –†–Њ—Б—Б–Є—О + –Њ—Б—В–∞–≤–ї—П–µ–Љ —Е–Њ—А–Њ—И–Є–µ —Б—В—А–∞–љ—Л
              FILTERED=$(echo "$DATA" | grep '^vless://' | grep -v '%F0%9F%87%B7%F0%9F%87%BA' | grep -E '%F0%9F%87%A9%F0%9F%87%AA|%F0%9F%87%B3%F0%9F%87%B1|%F0%9F%87%B5%F0%9F%87%B1|%F0%9F%87%AB%F0%9F%87%AE|%F0%9F%87%B8%F0%9F%87%AA|%F0%9F%87%B1%F0%9F%87%BB|%F0%9F%87%B1%F0%9F%87%B9')
              COUNT=$(echo "$FILTERED" | grep -c '^vless://' || echo 0)
              echo "  -> Found $COUNT vless servers (after filter)"
              ALL_SERVERS="$ALL_SERVERS"$'\n'"$FILTERED"
            else
              echo "  -> Failed to download, skipping"
            fi
          done

          # –£–±–Є—А–∞–µ–Љ –њ—Г—Б—В—Л–µ —Б—В—А–Њ–Ї–Є –Є –і—Г–±–ї–Є–Ї–∞—В—Л
          echo "$ALL_SERVERS" | grep '^vless://' | grep -v '^$' | sort -u > all_servers.txt

      - name: Split into 26 files
        run: |
          TOTAL=$(wc -l < all_servers.txt)
          echo "Total unique vless servers after filter: $TOTAL"

          if [ "$TOTAL" -eq 0 ]; then
            echo "No servers found! Creating empty files."
            for i in {1..26}; do
              touch "clean$i.txt"
            done
          else
            # –Я–µ—А–µ–Љ–µ—И–Є–≤–∞–µ–Љ —Б—В—А–Њ–Ї–Є
            shuf all_servers.txt > shuffled.txt

            # –Ъ–Њ–ї–Є—З–µ—Б—В–≤–Њ —Б–µ—А–≤–µ—А–Њ–≤ –љ–∞ —Д–∞–є–ї
            PER_FILE=$(( (TOTAL + 25) / 26 ))
            if [ "$PER_FILE" -lt 1 ]; then
              PER_FILE=1
            fi

            # –†–∞–Ј–±–Є–≤–∞–µ–Љ –љ–∞ 26 —Д–∞–є–ї–Њ–≤
            split -l $PER_FILE -d shuffled.txt part_

            # –Я–µ—А–µ–Є–Љ–µ–љ–Њ–≤—Л–≤–∞–µ–Љ –≤ clean1.txt ... clean26.txt
            for i in {0..25}; do
              FILE_NUM=$((i+1))
              if [ -f "part_$i" ]; then
                mv "part_$i" "clean$FILE_NUM.txt"
              else
                touch "clean$FILE_NUM.txt"
              fi
            done

            # –£–і–∞–ї—П–µ–Љ –≤—А–µ–Љ–µ–љ–љ—Л–µ —Д–∞–є–ї—Л
            rm -f part_* shuffled.txt
          fi

          rm -f all_servers.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add clean*.txt
          git diff --staged --quiet || git commit -m "Auto-update $(date +'%Y-%m-%d %H:%M:%S')"
          git push
